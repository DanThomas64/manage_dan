services:

  # ── Backend (Rust app) ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      # Persist the SQLite database in the project directory.
      - ./data:/data
      # Persist log files in the project directory.
      - ./logs:/data/logs
      # Optional: drop a config/local.toml next to docker-compose.yml to
      # override defaults (Vikunja token, printer mode, etc.) without
      # rebuilding the image.
      - ./config/local.toml:/data/config/local.toml:ro
    environment:
      # Set to "usb" to enable physical printing.
      - APP_PRINTER_MODE=${APP_PRINTER_MODE:-terminal}
      # Log files are written to /data/logs inside the container.
      - APP_LOG_DIR=/data/logs
      # Set to "false" to suppress stdout logging (fully headless).
      - LOG_STDOUT=${LOG_STDOUT:-true}

    # ── USB printer passthrough ──────────────────────────────────────────────
    # Passes the host USB bus into the container so the app can talk to a
    # physical ESC/POS printer.
    #
    # Prerequisites on the host:
    #   1. The udev rule must be installed (see README — USB printer setup).
    #      This sets MODE="0666" so the device is accessible without root.
    #   2. The printer must be plugged in before the container starts.
    #   3. Set APP_PRINTER_MODE=usb (env var or config/local.toml).
    #
    devices:
      - /dev/bus/usb:/dev/bus/usb

    # The app binds on 0.0.0.0:8080.  Expose it directly only if you need
    # to access the raw API without going through the frontend proxy.
    # ports:
    #   - "8080:8080"

  # ── Frontend (nginx static + API proxy) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app

