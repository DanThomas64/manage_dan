<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Lists</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #22263a;
      --border:      #2e3250;
      --accent:      #5b8dee;
      --accent-dim:  #2c4480;
      --green:       #3ecf8e;
      --red:         #e05c5c;
      --text:        #e4e8f0;
      --text-muted:  #7a82a0;
      --checked-fg:  #4a4f68;
      --radius:      10px;
      --shadow:      0 4px 24px rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      height: 100dvh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    header h1 span { color: var(--accent); }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .main {
      display: grid;
      grid-template-columns: 240px 1fr;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 220px; }
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .category-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      gap: 8px;
    }

    .category-item:hover { background: var(--surface2); }

    .category-item.active {
      background: var(--accent-dim);
      color: #c5d9ff;
      font-weight: 500;
    }

    .category-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .category-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .category-item:hover .category-delete { opacity: 1; }
    .category-delete:hover { color: var(--red); }

    .add-category-form {
      padding: 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Items panel ── */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .panel-title small {
      font-weight: 400;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-left: 8px;
    }

    .panel-actions { display: flex; gap: 8px; }

    .item-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius);
      transition: background 0.12s;
      border: 1px solid transparent;
    }

    .item-row:hover { background: var(--surface2); border-color: var(--border); }

    .item-check {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-label {
      flex: 1;
      line-height: 1.4;
      transition: color 0.15s, text-decoration 0.15s;
    }

    .item-label.checked {
      color: var(--checked-fg);
      text-decoration: line-through;
    }

    .item-qty {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .item-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .item-row:hover .item-delete { opacity: 1; }
    .item-delete:hover { color: var(--red); }

    .add-item-form {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Empty / loading states ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .empty-state .icon { font-size: 2.5rem; }

    /* ── Shared controls ── */
    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--text-muted); }

    button {
      border: none;
      border-radius: var(--radius);
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { filter: brightness(1.15); }
    button:active { filter: brightness(0.9); }
    button:disabled { opacity: 0.4; cursor: default; filter: none; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn-success { background: var(--green); color: #0f1117; }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 0.85rem;
      transition: transform 0.25s ease;
      pointer-events: none;
      z-index: 1000;
      box-shadow: var(--shadow);
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <h1><span>&#9676;</span> Shopping Lists</h1>
    <div class="header-actions">
      <button class="btn-ghost btn-sm" id="btn-clear" disabled onclick="clearChecked()">Clear checked</button>
      <button class="btn-success btn-sm" id="btn-print" disabled onclick="printList()">&#128424; Print</button>
    </div>
  </header>

  <div class="main">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">Lists</div>
      <div class="category-list" id="category-list">
        <div class="empty-state"><span class="icon">&#128722;</span><span>No lists yet</span></div>
      </div>
      <div class="add-category-form">
        <div style="display:flex;gap:8px;">
          <input type="text" id="new-cat-input" placeholder="New list name…" onkeydown="catKeydown(event)" />
          <button class="btn-primary btn-sm" onclick="addCategory()">+</button>
        </div>
      </div>
    </aside>

    <!-- Items panel -->
    <main class="panel">
      <div class="panel-header">
        <div class="panel-title" id="panel-title">
          Select a list
        </div>
      </div>

      <div class="item-list" id="item-list">
        <div class="empty-state">
          <span class="icon">&#8592;</span>
          <span>Pick a list to get started</span>
        </div>
      </div>

      <div class="add-item-form" id="add-item-form" style="display:none;">
        <input type="text" id="new-item-name" placeholder="Item name…" onkeydown="itemKeydown(event)" />
        <input type="text" id="new-item-qty" placeholder="Qty (optional)" style="max-width:120px;" onkeydown="itemKeydown(event)" />
        <button class="btn-primary btn-sm" onclick="addItem()">Add</button>
      </div>
    </main>

  </div>
</div>

<div id="toast"></div>

<script>
  const API = '/api/v1/shopping';

  let categories = [];
  let selectedCategoryId = null;
  let items = [];

  // ── Bootstrap ──────────────────────────────────────────────────────────────

  async function init() {
    await loadCategories();
  }

  // ── Categories ─────────────────────────────────────────────────────────────

  async function loadCategories() {
    try {
      const res = await fetch(`${API}/categories`);
      if (!res.ok) throw new Error(await res.text());
      categories = await res.json();
      renderCategories();
    } catch (e) {
      toast('Failed to load categories: ' + e.message, true);
    }
  }

  function renderCategories() {
    const el = document.getElementById('category-list');
    if (categories.length === 0) {
      el.innerHTML = '<div class="empty-state"><span class="icon">&#128722;</span><span>No lists yet</span></div>';
      return;
    }
    el.innerHTML = categories.map(c => `
      <div class="category-item${c.id === selectedCategoryId ? ' active' : ''}"
           onclick="selectCategory(${c.id})">
        <span class="category-name">${esc(c.name)}</span>
        <button class="category-delete btn-sm" title="Delete list"
                onclick="event.stopPropagation(); deleteCategory(${c.id})">&#215;</button>
      </div>
    `).join('');
  }

  async function selectCategory(id) {
    selectedCategoryId = id;
    renderCategories();
    const cat = categories.find(c => c.id === id);
    document.getElementById('panel-title').innerHTML =
      `${esc(cat.name)} <small id="item-count"></small>`;
    document.getElementById('add-item-form').style.display = 'flex';
    document.getElementById('btn-print').disabled = false;
    document.getElementById('btn-clear').disabled = false;
    await loadItems(id);
    document.getElementById('new-item-name').focus();
  }

  async function addCategory() {
    const input = document.getElementById('new-cat-input');
    const name = input.value.trim();
    if (!name) return;
    try {
      const res = await fetch(`${API}/categories`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      if (!res.ok) throw new Error(await res.text());
      input.value = '';
      await loadCategories();
      const added = categories.find(c => c.name === name);
      if (added) selectCategory(added.id);
    } catch (e) {
      toast('Failed to add list: ' + e.message, true);
    }
  }

  async function deleteCategory(id) {
    const cat = categories.find(c => c.id === id);
    if (!confirm(`Delete list "${cat?.name}"? This removes all its items.`)) return;
    try {
      const res = await fetch(`${API}/categories/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      if (selectedCategoryId === id) {
        selectedCategoryId = null;
        items = [];
        document.getElementById('item-list').innerHTML =
          '<div class="empty-state"><span class="icon">&#8592;</span><span>Pick a list to get started</span></div>';
        document.getElementById('panel-title').innerHTML = 'Select a list';
        document.getElementById('add-item-form').style.display = 'none';
        document.getElementById('btn-print').disabled = true;
        document.getElementById('btn-clear').disabled = true;
      }
      await loadCategories();
      toast(`Deleted "${cat?.name}"`);
    } catch (e) {
      toast('Failed to delete list: ' + e.message, true);
    }
  }

  function catKeydown(e) { if (e.key === 'Enter') addCategory(); }

  // ── Items ──────────────────────────────────────────────────────────────────

  async function loadItems(categoryId) {
    try {
      const res = await fetch(`${API}/categories/${categoryId}/items`);
      if (!res.ok) throw new Error(await res.text());
      items = await res.json();
      renderItems();
    } catch (e) {
      toast('Failed to load items: ' + e.message, true);
    }
  }

  function renderItems() {
    const el = document.getElementById('item-list');
    const pending = items.filter(i => !i.checked);
    const done    = items.filter(i => i.checked);

    const countEl = document.getElementById('item-count');
    if (countEl) countEl.textContent = `${pending.length} remaining`;

    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state"><span class="icon">&#9989;</span><span>Nothing here — add something!</span></div>';
      return;
    }

    const row = i => `
      <div class="item-row" id="item-${i.id}">
        <input type="checkbox" class="item-check" ${i.checked ? 'checked' : ''}
               onchange="checkItem(${i.id}, this.checked)" />
        <span class="item-label${i.checked ? ' checked' : ''}">${esc(i.name)}</span>
        ${i.quantity ? `<span class="item-qty">${esc(i.quantity)}</span>` : ''}
        <button class="item-delete" title="Remove" onclick="deleteItem(${i.id})">&#215;</button>
      </div>`;

    el.innerHTML =
      pending.map(row).join('') +
      (done.length ? `
        <div style="margin:16px 0 8px;font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;">
          Already obtained
        </div>` + done.map(row).join('') : '');
  }

  async function addItem() {
    if (!selectedCategoryId) return;
    const nameEl = document.getElementById('new-item-name');
    const qtyEl  = document.getElementById('new-item-qty');
    const name   = nameEl.value.trim();
    const qty    = qtyEl.value.trim() || null;
    if (!name) return;
    try {
      const res = await fetch(`${API}/categories/${selectedCategoryId}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, quantity: qty }),
      });
      if (!res.ok) throw new Error(await res.text());
      nameEl.value = '';
      qtyEl.value  = '';
      nameEl.focus();
      await loadItems(selectedCategoryId);
    } catch (e) {
      toast('Failed to add item: ' + e.message, true);
    }
  }

  async function checkItem(id, checked) {
    try {
      const res = await fetch(`${API}/items/${id}/check`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ checked }),
      });
      if (!res.ok) throw new Error(await res.text());
      await loadItems(selectedCategoryId);
    } catch (e) {
      toast('Failed to update item: ' + e.message, true);
    }
  }

  async function deleteItem(id) {
    try {
      const res = await fetch(`${API}/items/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      await loadItems(selectedCategoryId);
    } catch (e) {
      toast('Failed to delete item: ' + e.message, true);
    }
  }

  async function clearChecked() {
    if (!selectedCategoryId) return;
    const count = items.filter(i => i.checked).length;
    if (count === 0) { toast('No checked items to clear'); return; }
    try {
      const res = await fetch(`${API}/categories/${selectedCategoryId}/clear`, { method: 'POST' });
      if (!res.ok) throw new Error(await res.text());
      await loadItems(selectedCategoryId);
      toast(`Cleared ${count} item${count === 1 ? '' : 's'}`);
    } catch (e) {
      toast('Failed to clear: ' + e.message, true);
    }
  }

  async function printList() {
    if (!selectedCategoryId) return;
    try {
      const res = await fetch(`${API}/categories/${selectedCategoryId}/print`, { method: 'POST' });
      if (!res.ok) throw new Error(await res.text());
      toast('Sent to printer!');
    } catch (e) {
      toast('Print failed: ' + e.message, true);
    }
  }

  function itemKeydown(e) { if (e.key === 'Enter') addItem(); }

  // ── Utilities ──────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  let toastTimer;
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }

  // ── Start ──────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
