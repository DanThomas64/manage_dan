# Default configuration settings for the application

# Application environment (used for environment-specific config loading)
environment = "development"

[printer]
# Vendor ID (VID) for the USB ESC/POS printer
# Default: 0x0fe6
vendor_id = 4070

# Product ID (PID) for the USB ESC/POS printer
# Default: 0x811e
product_id = 33054

# Printer backend: "usb" for physical thermal printer, "terminal" for stdout rendering
mode = "terminal"

# Characters per line of the physical receipt.  Common values: 42 (ESC/POS default) or 48.
# Check your printer's spec sheet and set this in config/local.toml if needed.
characters_per_line = 42

# How often the print monitor polls Vikunja for "print"-labelled tasks (seconds).
monitor_interval_secs = 30

# Local hour (0-23) at which the daily summary ticket is printed.
summary_hour = 8

# Detail level for the daily summary ticket.
# Options: "minimal" (overdue only), "standard" (overdue + high priority),
#          "full" (overdue + high priority + upcoming 7 days)
summary_level = "full"

# Directory where rotating log files are written.
# Override in config/local.toml or via APP_LOG_DIR environment variable.
log_dir = "logs"

[vikunja]
# Base URL of your self-hosted Vikunja instance (no trailing slash)
base_url = "http://localhost:3456"

# API token created in Vikunja Settings > API Tokens
api_token = ""

# Vikunja project ID to store tasks in
project_id = 1
